<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAPOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#ffffff',
            bg: '#f8fafc',
            border: '#e2e8f0',
            sidebar: {
              bg: '#0f172a',
              hover: '#1e293b',
              active: '#1e293b',
              border: '#1e293b',
              text: '#94a3b8',
              'text-bright': '#e2e8f0',
              muted: '#475569',
            },
            text: {
              primary: '#1e293b',
              secondary: '#475569',
              muted: '#94a3b8',
              faint: '#cbd5e1',
            },
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'monospace'],
            ui: ['Outfit', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      margin: 0;
    }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .shadow-green { box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12); }
    .shadow-red { box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12); }
    .shadow-amber { box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.12); }
    pre { font-family: 'JetBrains Mono', monospace; }
    input::placeholder { color: #94a3b8; }
    select { appearance: none; }

    /* ------------------------------------------------------------------ */
    /* Dark mode overrides — flips light-mode content classes globally     */
    /* ------------------------------------------------------------------ */
    html.dark body { background: #0f172a; color: #e2e8f0; }
    html.dark ::-webkit-scrollbar-thumb { background: #475569; }
    html.dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    html.dark input::placeholder { color: #64748b; }

    /* Backgrounds */
    html.dark .bg-white { background-color: #1e293b; }
    html.dark .bg-slate-50 { background-color: #0f172a; }
    html.dark .bg-slate-100 { background-color: #1e293b; }

    /* Borders */
    html.dark .border-slate-100 { border-color: #1e293b; }
    html.dark .border-slate-200 { border-color: #334155; }
    html.dark .border-slate-300 { border-color: #475569; }

    /* Text — invert light-mode text to dark-mode equivalents */
    html.dark .text-slate-800 { color: #e2e8f0; }
    html.dark .text-slate-700 { color: #cbd5e1; }
    html.dark .text-slate-600 { color: #94a3b8; }
    html.dark .text-slate-500 { color: #94a3b8; }
    html.dark .text-slate-400 { color: #64748b; }
    html.dark .text-slate-300 { color: #94a3b8; }

    /* Hover states */
    html.dark .hover\:bg-slate-50:hover { background-color: #1e293b; }
    html.dark .hover\:bg-slate-100:hover { background-color: #334155; }
    html.dark .hover\:bg-slate-200:hover { background-color: #334155; }

    /* Inputs and interactive elements in dark */
    html.dark .bg-slate-50.border-slate-300,
    html.dark input.bg-slate-50,
    html.dark select.bg-slate-50,
    html.dark textarea.bg-slate-50 { background-color: #1e293b; color: #e2e8f0; }

    /* Badges — soften light-bg pills in dark mode */
    html.dark .bg-red-50 { background-color: rgba(239, 68, 68, 0.15); }
    html.dark .bg-amber-50 { background-color: rgba(245, 158, 11, 0.15); }
    html.dark .bg-blue-50 { background-color: rgba(59, 130, 246, 0.15); }
    html.dark .bg-green-50 { background-color: rgba(34, 197, 94, 0.15); }
    html.dark .bg-purple-50 { background-color: rgba(168, 85, 247, 0.15); }
    html.dark .border-red-200 { border-color: rgba(239, 68, 68, 0.3); }
    html.dark .border-amber-200 { border-color: rgba(245, 158, 11, 0.3); }
    html.dark .border-blue-200 { border-color: rgba(59, 130, 246, 0.3); }
    html.dark .border-green-200 { border-color: rgba(34, 197, 94, 0.3); }
    html.dark .border-purple-200 { border-color: rgba(168, 85, 247, 0.3); }

    /* Step type badges */
    html.dark .bg-blue-100 { background-color: rgba(59, 130, 246, 0.2); }
    html.dark .bg-purple-100 { background-color: rgba(168, 85, 247, 0.2); }
    html.dark .bg-amber-100 { background-color: rgba(245, 158, 11, 0.2); }
    html.dark .bg-green-100 { background-color: rgba(34, 197, 94, 0.2); }
    html.dark .bg-red-100 { background-color: rgba(239, 68, 68, 0.2); }
    html.dark .bg-teal-100 { background-color: rgba(20, 184, 166, 0.2); }
    html.dark .bg-cyan-100 { background-color: rgba(6, 182, 212, 0.2); }

    /* Progress bar track */
    html.dark .bg-slate-200 { background-color: #334155; }

    /* Shadow */
    html.dark .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.4); }
    html.dark .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="/static/App.jsx?v=67"></script>
</body>
</html>
