version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pipeline_agent
      POSTGRES_USER: pipeline_agent
      POSTGRES_PASSWORD: pipeline_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
