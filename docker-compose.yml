version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pipeline_agent
      POSTGRES_USER: pipeline_agent
      POSTGRES_PASSWORD: pipeline_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline_agent"]
      interval: 5s
      timeout: 5s
      retries: 5

  demo-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: demo_ecommerce
    ports:
      - "3307:3306"
    volumes:
      - ./demo/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  demo-mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - ./demo/mongo-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  demo-api:
    build: ./demo/mock-api
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
